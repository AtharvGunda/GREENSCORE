version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greenscore
      POSTGRES_USER: greenscore_user
      POSTGRES_PASSWORD: greenscore_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./server/src/database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

volumes:
  pgdata:
